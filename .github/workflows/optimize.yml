name: WebP Optimization Check

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    optimize-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: cachix/install-nix-action@v27
              with:
                  nix_path: nixpkgs=channel:nixos-unstable

            - name: Setup Go and Libwebp via Nix
              run: nix develop --command echo "Environment ready"

            - name: Build CLI
              run: nix develop --command go build -o webp-cli .

            - name: Run Optimization (Dry Run by default for safety in CI)
              run: nix develop --command ./webp-cli -dir . -dry-run
              # To auto-fix/commit, you would remove -dry-run and add a commit step.
