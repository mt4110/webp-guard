name: Beta Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Test
        run: nix develop --command go test ./...

      - name: Build CLI
        run: nix develop --command go build -o webp-guard .

      - name: Scan Images
        run: |
          mkdir -p out
          nix develop --command ./webp-guard scan \
            -dir . \
            -report ./out/scan-report.jsonl

      - name: Bulk Conversion
        run: |
          mkdir -p out
          nix develop --command ./webp-guard bulk \
            -dir . \
            -out-dir ./out/assets \
            -report ./out/conversion-report.jsonl \
            -manifest ./out/conversion-manifest.json

      - name: Verify Local Conversion
        run: |
          nix develop --command ./webp-guard verify \
            -dir . \
            -manifest ./out/conversion-manifest.json \
            -report ./out/verify-report.jsonl

      - name: Plan DEV Delivery
        run: |
          nix develop --command ./webp-guard plan \
            -conversion-manifest ./out/conversion-manifest.json \
            -release-manifest ./out/release-manifest.json \
            -deploy-plan ./out/deploy-plan.dev.json \
            -env dev \
            -origin-provider local \
            -origin-root ./out/dev-origin

      - name: Publish Dry Run
        run: |
          nix develop --command ./webp-guard publish \
            -plan ./out/deploy-plan.dev.json \
            -dry-run=plan

      - name: Publish DEV Local Path
        run: |
          nix develop --command ./webp-guard publish \
            -plan ./out/deploy-plan.dev.json \
            -dry-run=off

      - name: Verify Delivery
        run: |
          nix develop --command ./webp-guard verify-delivery \
            -plan ./out/deploy-plan.dev.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: webp-guard-beta-artifacts
          path: out/
